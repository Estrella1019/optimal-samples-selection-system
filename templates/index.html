<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimal Samples Selection System</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ── S1: Main Screen ─────────────────────────────────────── -->
  <div style="max-width:860px; margin:0 auto;">

    <div class="card">
      <h1 class="page-title">An Optimal Samples Selection System</h1>
      <p class="page-sub">CS360 / SE360 &nbsp;|&nbsp; Please input the following parameters</p>

      <!-- Parameter hint -->
      <p style="text-align:center; font-size:.82rem; color:#94a3b8; margin-bottom:18px;">
        45 ≤ m ≤ 54 &nbsp;|&nbsp; 7 ≤ n ≤ 25 &nbsp;|&nbsp; 4 ≤ k ≤ 7 &nbsp;|&nbsp;
        s ≤ j ≤ k &nbsp;|&nbsp; 3 ≤ s ≤ 7
      </p>

      <!-- Parameter inputs -->
      <div class="param-grid">
        <div class="param-item">
          <label>m &nbsp;<span style="color:#94a3b8">(45–54)</span></label>
          <input type="number" id="m" min="45" max="54" placeholder="e.g. 45">
        </div>
        <div class="param-item">
          <label>n &nbsp;<span style="color:#94a3b8">(7–25)</span></label>
          <input type="number" id="n" min="7" max="25" placeholder="e.g. 9">
        </div>
        <div class="param-item">
          <label>k &nbsp;<span style="color:#94a3b8">(4–7)</span></label>
          <input type="number" id="k" min="4" max="7" placeholder="e.g. 6">
        </div>
        <div class="param-item">
          <label>j &nbsp;<span style="color:#94a3b8">(s ≤ j ≤ k)</span></label>
          <input type="number" id="j" min="4" max="7" placeholder="e.g. 5">
        </div>
        <div class="param-item">
          <label>s &nbsp;<span style="color:#94a3b8">(3–7)</span></label>
          <input type="number" id="s" min="3" max="7" placeholder="e.g. 5">
        </div>
        <div class="param-item">
          <label>Min Coverage &nbsp;<span style="color:#94a3b8">(≥1)</span></label>
          <input type="number" id="min_coverage" min="1" value="1" placeholder="1">
        </div>
      </div>

      <!-- Random / Manual mode -->
      <div class="mode-row">
        <label>
          <input type="radio" name="mode" value="random" id="modeRandom" checked>
          Random n
        </label>
        <label>
          <input type="radio" name="mode" value="manual" id="modeManual">
          Input n manually
        </label>

        <!-- Quick examples dropdown -->
        <select id="exampleSelect" style="margin-left:auto; padding:6px 10px;
          border:1.5px solid #cbd5e1; border-radius:6px; font-size:.88rem; color:#374151;">
          <option value="">— Quick Examples —</option>
          <option value="45,7,6,5,5">E.g.1: m=45 n=7 k=6 j=5 s=5</option>
          <option value="45,8,6,5,5">E.g.2: m=45 n=8 k=6 j=5 s=5</option>
          <option value="45,8,6,4,4">E.g.3: m=45 n=8 k=6 j=4 s=4</option>
          <option value="45,9,6,4,4">E.g.4: m=45 n=9 k=6 j=4 s=4</option>
          <option value="45,8,6,6,5">E.g.5: m=45 n=8 k=6 j=6 s=5</option>
          <option value="45,9,6,5,4">E.g.7: m=45 n=9 k=6 j=5 s=4</option>
          <option value="45,10,6,6,4">E.g.8: m=45 n=10 k=6 j=6 s=4</option>
          <option value="45,12,6,6,4">E.g.9: m=45 n=12 k=6 j=6 s=4</option>
        </select>
      </div>

      <!-- Manual input box (hidden by default) -->
      <div id="manual-section" style="display:none;">
        <label for="manualInput">
          Enter <span id="nHint" style="color:var(--blue); font-weight:700;">n</span>
          numbers (1–<span id="mHint">54</span>), comma-separated:
        </label>
        <input type="text" id="manualInput"
               placeholder="e.g.  3, 7, 12, 19, 25, 31, 38, 42, 50">
      </div>

      <!-- Selected samples display -->
      <div id="selectedBanner"></div>

      <!-- Action buttons -->
      <div class="btn-row">
        <button class="btn btn-blue" id="btnExecute" onclick="doExecute()">
          ▶ Execute
        </button>
        <div class="spinner" id="spinner"></div>

        <button class="btn btn-green" id="btnStore" onclick="doStore()" disabled>
          💾 Store to DB
        </button>
        <button class="btn btn-gray" onclick="doClear()">✕ Clear</button>

        <a class="btn btn-orange" href="/db" style="margin-left:auto;">
          Next ▶ (Database)
        </a>
      </div>
    </div>

    <!-- Results card -->
    <div class="card" id="resultCard" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <h2 style="font-size:1.1rem; font-weight:700; color:var(--blue-dk); display:flex; align-items:center; gap:8px;">
          Results
          <span id="countBadge" style="
            background:#dbeafe; color:var(--blue-dk);
            font-size:.82rem; padding:2px 10px; border-radius:99px;
          "></span>
          <span id="methodBadge" style="
            font-size:.78rem; padding:3px 10px; border-radius:99px;
            font-weight:700; display:none;
          "></span>
        </h2>
        <button class="btn btn-gray" onclick="window.print()" style="padding:6px 14px; font-size:.82rem;">
          🖨 Print
        </button>
      </div>
      <div id="resultBox"></div>
    </div>

  </div><!-- /max-width wrapper -->

  <div id="toast"></div>

  <script>
  // ── State ────────────────────────────────────────────────────
  let lastResult = null;

  // ── Example dropdown ─────────────────────────────────────────
  document.getElementById("exampleSelect").addEventListener("change", function() {
    if (!this.value) return;
    const [m, n, k, j, s] = this.value.split(",").map(Number);
    document.getElementById("m").value = m;
    document.getElementById("n").value = n;
    document.getElementById("k").value = k;
    document.getElementById("j").value = j;
    document.getElementById("s").value = s;
    updateHints();
    this.value = "";
  });

  // ── Mode toggle ───────────────────────────────────────────────
  document.querySelectorAll("input[name=mode]").forEach(r =>
    r.addEventListener("change", () => {
      document.getElementById("manual-section").style.display =
        document.getElementById("modeManual").checked ? "block" : "none";
    })
  );

  // ── Live hints ────────────────────────────────────────────────
  function updateHints() {
    const n = document.getElementById("n").value;
    const m = document.getElementById("m").value;
    if (n) document.getElementById("nHint").textContent = n;
    if (m) document.getElementById("mHint").textContent = m;
  }
  document.getElementById("n").addEventListener("input", updateHints);
  document.getElementById("m").addEventListener("input", updateHints);

  // ── Execute ───────────────────────────────────────────────────
  async function doExecute() {
    const payload = collectPayload();
    if (!payload) return;

    setRunning(true);
    lastResult = null;
    document.getElementById("btnStore").disabled = true;

    try {
      const resp = await fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();

      if (data.error) {
        showResult("ERROR:\n" + data.error, true);
      } else {
        lastResult = data;
        showSuccess(data);
      }
    } catch (e) {
      showResult("Network error: " + e, true);
    } finally {
      setRunning(false);
    }
  }

  // ── Store ─────────────────────────────────────────────────────
  async function doStore() {
    if (!lastResult) return;

    const payload = { ...lastResult.params, ...lastResult };
    const resp = await fetch("/store", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();

    if (data.error) {
      showToast("❌ " + data.error);
    } else {
      showToast(`✅ Saved as: ${data.filename}`);
      document.getElementById("btnStore").disabled = true;
    }
  }

  // ── Clear ─────────────────────────────────────────────────────
  function doClear() {
    ["m","n","k","j","s","min_coverage","manualInput"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = id === "min_coverage" ? "1" : "";
    });
    document.getElementById("selectedBanner").style.display = "none";
    document.getElementById("resultCard").style.display = "none";
    document.getElementById("resultBox").textContent = "";
    document.getElementById("btnStore").disabled = true;
    document.getElementById("exampleSelect").value = "";
    document.getElementById("modeRandom").checked = true;
    document.getElementById("manual-section").style.display = "none";
    lastResult = null;
    updateHints();
  }

  // ── Helpers ───────────────────────────────────────────────────
  function collectPayload() {
    const get = id => document.getElementById(id).value.trim();
    const isManual = document.getElementById("modeManual").checked;
    return {
      m: get("m"), n: get("n"), k: get("k"),
      j: get("j"), s: get("s"),
      min_coverage: get("min_coverage") || "1",
      manual_input: isManual ? get("manualInput") : ""
    };
  }

  function setRunning(yes) {
    document.getElementById("btnExecute").disabled = yes;
    document.getElementById("spinner").style.display = yes ? "inline-block" : "none";
  }

  function showSuccess(data) {
    // Banner
    const banner = document.getElementById("selectedBanner");
    banner.style.display = "block";
    banner.textContent =
      `Selected ${data.params.n} samples from ${data.params.m}: ${data.selected.join(", ")}`;

    // Count badge
    document.getElementById("countBadge").textContent =
      `${data.count} groups found`;

    // Method badge — highlight exact vs greedy
    const mb = document.getElementById("methodBadge");
    mb.style.display = "inline-block";
    if (data.method === "exact") {
      mb.textContent   = "✓ Exact · Provably Optimal";
      mb.style.background = "#dcfce7";
      mb.style.color      = "#15803d";
    } else {
      mb.textContent   = "≈ Greedy · Near-Optimal";
      mb.style.background = "#fef9c3";
      mb.style.color      = "#854d0e";
    }

    // Result text
    const algo = data.method === "exact"
      ? "Algorithm : Exact Backtracking + Branch & Bound (Provably Optimal)"
      : "Algorithm : Greedy + Random Restarts (Near-Optimal)";

    let txt = `Parameters: m=${data.params.m}, n=${data.params.n}, k=${data.params.k}, `
            + `j=${data.params.j}, s=${data.params.s}, min_coverage=${data.params.min_coverage}\n`
            + `${algo}\n`
            + `Coverage verified: ${data.verified ? "YES ✓" : "NO ✗"}\n`
            + `\nValid k-groups (${data.count} total):\n`;
    data.groups.forEach((g, i) =>
      txt += `  ${String(i+1).padStart(3)}. [${g.join(", ")}]\n`
    );

    showResult(txt, false);
    document.getElementById("resultCard").style.display = "block";
    document.getElementById("btnStore").disabled = false;
  }

  function showResult(text, isError) {
    const box = document.getElementById("resultBox");
    box.textContent = text;
    box.className = isError ? "error-text" : "";
    document.getElementById("resultCard").style.display = "block";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }
  </script>
</body>
</html>
